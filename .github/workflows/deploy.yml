name: Deploy to GitHub Pages

# client/ 폴더를 GitHub Pages로 배포합니다.
# 저장소 설정 → Pages → Source 를 "GitHub Actions" 로 한 번만 바꿔주면 됩니다.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload client as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
