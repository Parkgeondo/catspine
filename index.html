<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- GitHub Pages가 저장소 루트를 서빙할 때, 실제 게임은 client/ 에 있으므로 이동시킨다. -->
    <meta http-equiv="refresh" content="0; url=./client/" />
    <link rel="canonical" href="./client/" />
    <title>고양이 돌리기 🐱</title>
    <script>
      // 쿼리/해시를 보존하며 즉시 이동
      location.replace('./client/' + location.search + location.hash);
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #14102a;
        color: #f4f1ff;
        font-family: system-ui, sans-serif;
      }
      a {
        color: #ffb648;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <p>🐱 <a href="./client/">고양이 돌리기 게임으로 이동 →</a></p>
  </body>
</html>
